name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          # Sets basePath so assets are served from the correct sub-path on GitHub Pages.
          # Remove this if deploying to a custom domain or user/org pages (e.g. username.github.io).
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      # GitHub Pages serves 404.html for unknown paths — this lets the Next.js
      # client-side router handle dynamic routes like /planner/[strategyId].
      - name: Copy index.html to 404.html for SPA routing
        run: cp apps/web/out/index.html apps/web/out/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
